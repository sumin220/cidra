name: Cidra
options:
  bundleIdPrefix: com.cidra
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

targets:
  Cidra:
    type: application
    platform: macOS
    sources:
      - Sources
    dependencies:
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cidra.app
        INFOPLIST_FILE: Sources/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/Cidra.entitlements
        ENABLE_APP_SANDBOX: false
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleName: Cidra
        CFBundleDisplayName: Cidra
        CFBundleIdentifier: com.cidra.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: Cidra
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSMainNibFile: ""
        NSPrincipalClass: NSApplication
    entitlements:
      path: Sources/Resources/Cidra.entitlements
      properties:
        com.apple.security.app-sandbox: false
